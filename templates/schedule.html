{% extends "base.html" %}

{% block content %}

<div class="page">

    <h1>📅 Calendario NASCAR 2025</h1>

    <table>

        <thead>
            <tr>
                <th>Fecha</th>
                <th>Circuito</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody>

            {% for race in races %}
            <tr>
                <td>{{ race.date }}</td>
                <td>{{ race.track }}</td>
                <td>{{ race.status }}</td>
            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
